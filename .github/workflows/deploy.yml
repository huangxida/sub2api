name: Build & Deploy sub2api

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to build/deploy, for example v1.20.0. Leave empty to use the latest v* tag."
        required: false
        type: string
      publish_release:
        description: "Create or update the GitHub Release for the resolved version tag."
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-sub2api
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  HOST: production
  GHCR_IMAGE: ghcr.io/huangxida/sub2api

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      image_version: ${{ steps.version.outputs.image_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      target_sha: ${{ steps.version.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            image_version="${GITHUB_REF_NAME}"
            release_tag="${GITHUB_REF_NAME}"
          else
            requested_tag="${{ inputs.version_tag || '' }}"
            if [[ -n "$requested_tag" ]]; then
              if ! git rev-parse --verify --quiet "${requested_tag}^{commit}" >/dev/null; then
                echo "Requested tag '${requested_tag}' does not exist." >&2
                exit 1
              fi
              image_version="$requested_tag"
              release_tag="$requested_tag"
            else
              latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
              if [[ -n "$latest_tag" ]]; then
                image_version="$latest_tag"
                release_tag="$latest_tag"
              else
                image_version="$(git rev-parse --short=12 HEAD)"
                release_tag=""
              fi
            fi
          fi

          target_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"

          {
            echo "image_version=${image_version}"
            echo "release_tag=${release_tag}"
            echo "target_sha=${target_sha}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

          echo "Image version: ${image_version}"
          echo "Release tag: ${release_tag:-<none>}"
          echo "Target SHA: ${target_sha}"

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        shell: bash
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          IMAGE_VERSION="${{ steps.version.outputs.image_version }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${IMAGE_VERSION}" \
            --build-arg COMMIT="${SHORT_SHA}" \
            --build-arg DATE="${BUILD_DATE}" \
            --build-arg GOPROXY="https://goproxy.cn,direct" \
            --build-arg GOSUMDB="sum.golang.google.cn" \
            -t "$GHCR_IMAGE:latest" \
            -t "$GHCR_IMAGE:${IMAGE_VERSION}" \
            --push \
            .

      - name: Configure SSH
        shell: bash
        env:
          SUB2API_DEPLOY_SSH_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
          SUB2API_DEPLOY_HOST: ${{ secrets.SUB2API_DEPLOY_HOST }}
          SUB2API_DEPLOY_PORT: ${{ secrets.SUB2API_DEPLOY_PORT }}
        run: |
          if [[ -z "$SUB2API_DEPLOY_HOST" ]]; then
            echo "SUB2API_DEPLOY_HOST secret is required." >&2
            exit 1
          fi

          if [[ -z "$SUB2API_DEPLOY_PORT" ]]; then
            echo "SUB2API_DEPLOY_PORT secret is required." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_sub2api
          printf '%s\n' "$SUB2API_DEPLOY_SSH_KEY" > ~/.ssh/deploy_sub2api
          chmod 600 ~/.ssh/deploy_sub2api
          cat > ~/.ssh/config <<'SSHCONF'
          Host production
              HostName __SUB2API_DEPLOY_HOST__
              Port __SUB2API_DEPLOY_PORT__
              User deploy-sub2api
              IdentityFile ~/.ssh/deploy_sub2api
              IdentitiesOnly yes
              ServerAliveInterval 60
              StrictHostKeyChecking accept-new
              UserKnownHostsFile ~/.ssh/known_hosts
              ConnectTimeout 10
          SSHCONF
          sed -i "s|__SUB2API_DEPLOY_HOST__|${SUB2API_DEPLOY_HOST}|g; s|__SUB2API_DEPLOY_PORT__|${SUB2API_DEPLOY_PORT}|g" ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy on $HOST
        shell: bash
        run: |
          ssh -o ConnectTimeout=15 "$HOST" sudo /usr/local/sbin/deploy-sub2api "${{ steps.version.outputs.image_version }}"

  release:
    if: >-
      success() &&
      needs.build-deploy.outputs.release_tag != '' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      )
    needs: build-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch tags for release notes
        shell: bash
        run: git fetch --force --tags origin

      - name: Generate release notes
        shell: bash
        run: |
          TAG_NAME="${{ needs.build-deploy.outputs.release_tag }}"
          TARGET_SHA="${{ needs.build-deploy.outputs.target_sha }}"
          prev_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          {
            echo "## Release ${TAG_NAME}"
            echo
            echo "Automated source release for tag \`${TAG_NAME}\`."
            echo
            if [ -n "$prev_tag" ]; then
              echo "Changes since \`${prev_tag}\`:"
              echo
              git log "${prev_tag}..${TARGET_SHA}" --pretty=format:"- %s (%h)"
            else
              echo "Initial tagged release in this repository."
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-deploy.outputs.release_tag }}
          target_commitish: ${{ needs.build-deploy.outputs.target_sha }}
          name: ${{ needs.build-deploy.outputs.release_tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
