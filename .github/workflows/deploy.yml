name: Build & Deploy sub2api to ca1

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-sub2api
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  HOST: ca1
  GHCR_IMAGE: ghcr.io/huangxida/sub2api-ca1
  IMAGE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        shell: bash
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${IMAGE_VERSION}" \
            --build-arg COMMIT="${SHORT_SHA}" \
            --build-arg DATE="${BUILD_DATE}" \
            --build-arg GOPROXY="https://goproxy.cn,direct" \
            --build-arg GOSUMDB="sum.golang.google.cn" \
            -t "$GHCR_IMAGE:latest" \
            -t "$GHCR_IMAGE:${IMAGE_VERSION}" \
            --push \
            .

      - name: Configure SSH
        shell: bash
        env:
          CA1_DEPLOY_SSH_KEY: ${{ secrets.CA1_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_ca1_sub2api
          printf '%s\n' "$CA1_DEPLOY_SSH_KEY" > ~/.ssh/deploy_ca1_sub2api
          chmod 600 ~/.ssh/deploy_ca1_sub2api
          cat > ~/.ssh/config <<'SSHCONF'
          Host ca1
              HostName 107.140.5.5
              Port 55222
              User deploy-sub2api
              IdentityFile ~/.ssh/deploy_ca1_sub2api
              IdentitiesOnly yes
              ServerAliveInterval 60
              StrictHostKeyChecking accept-new
              UserKnownHostsFile ~/.ssh/known_hosts
              ConnectTimeout 10
          SSHCONF
          chmod 600 ~/.ssh/config

      - name: Deploy on $HOST
        shell: bash
        run: |
          ssh -o ConnectTimeout=15 "$HOST" sudo /usr/local/sbin/deploy-sub2api "$IMAGE_VERSION"

  release:
    if: success() && startsWith(github.ref, 'refs/tags/')
    needs: build-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch tags for release notes
        shell: bash
        run: git fetch --force --tags origin

      - name: Generate release notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          TARGET_SHA="${GITHUB_SHA}"
          prev_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          {
            echo "## Release ${TAG_NAME}"
            echo
            echo "Automated source release for tag \`${TAG_NAME}\`."
            echo
            if [ -n "$prev_tag" ]; then
              echo "Changes since \`${prev_tag}\`:"
              echo
              git log "${prev_tag}..${TARGET_SHA}" --pretty=format:"- %s (%h)"
            else
              echo "Initial tagged release in this repository."
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
